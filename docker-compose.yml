services:
  api:
    build: .
    container_name: ai-smartec-tickets-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  worker:
    build: .
    container_name: ai-smartec-tickets-worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app

  frontend:
    build: .
    container_name: ai-smartec-tickets-frontend
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    env_file:
      - .env
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8000}
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - .:/app

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-smartec-tickets-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartec}
      POSTGRES_DB: ${POSTGRES_DB:-ai_smartec_tickets}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartec} -d ${POSTGRES_DB:-ai_smartec_tickets}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-smartec-tickets-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
